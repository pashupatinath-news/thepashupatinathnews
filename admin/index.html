<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
PASHUPATINATH NEWS ADMIN
</title>


<style>

body{

font-family:Arial,sans-serif;
background:#f4f4f4;
padding:20px;

}


.box{

background:white;
max-width:500px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc;

}


h1{

background:#b30000;
color:white;
padding:15px;
text-align:center;
border-radius:10px;

}


input,textarea,select{

width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;

}


textarea{

height:120px;

}


button{

width:100%;
padding:12px;
background:#b30000;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;

}


button:hover{

background:#800000;

}


</style>


</head>


<body>
<script>

let pass = prompt("Enter Admin Password");

if(pass !== "12345"){
    alert("Wrong Password");
    document.body.innerHTML = "";
}

</script>

<div class="box">


<h1>
ADMIN PANEL
</h1>


<input id="title" 
placeholder="News Headline">


<textarea id="description"
placeholder="News Description"></textarea>


<input id="image"
placeholder="Image URL">


<select id="category">

<option>
National
</option>

<option>
Sports
</option>

<option>
Technology
</option>

<option>
World
</option>

<option>
Entertainment
</option>

</select>


<button onclick="publishNews()">
Publish News
</button>

<input id="breakingText" placeholder="Breaking News Headline">

<button onclick="saveBreaking()">
Save Breaking News
</button>
</div>



<script>


function publishNews(){


let news = {


title:
document.getElementById("title").value,


description:
document.getElementById("description").value,


image:
document.getElementById("image").value,


category:
document.getElementById("category").value


};



let oldNews = JSON.parse(localStorage.getItem("newsList")) || [];

oldNews.push(news);

localStorage.setItem(
"newsList",
JSON.stringify(oldNews)
);

alert("News Published Successfully");

showNews();

}
</script>

<div id="postedNews" style="margin-top:20px;"></div>

<script>

function showNews(){

let newsList = JSON.parse(localStorage.getItem("newsList")) || [];

let box = document.getElementById("postedNews");

box.innerHTML = "<h2>Posted News</h2>";


newsList.forEach(function(news,index){

box.innerHTML += `

<div style="
background:#f4f4f4;
padding:15px;
margin-top:10px;
border-radius:10px;
">

<h3>${news.title}</h3>

<p>${news.category}</p>

<button onclick="deleteNews(${index})"
style="
background:red;
color:white;
padding:8px;
border:none;
border-radius:5px;
">
Delete
</button>

</div>

`;

});

}


function deleteNews(index){

let newsList = JSON.parse(localStorage.getItem("newsList")) || [];

newsList.splice(index,1);

localStorage.setItem(
"newsList",
JSON.stringify(newsList)
);

showNews();

}


showNews();
function saveBreaking(){

let text = document.getElementById("breakingText").value;

localStorage.setItem(
"breakingNews",
text
);

alert("Breaking News Saved");

}
</script>
</body>
