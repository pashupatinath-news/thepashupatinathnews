<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE PASHUPATINATH NEWS</title>
<style>
    body{font-family:Arial;margin:0;background:#F5F5F5;padding-bottom:80px;}
    
   /* HEADER BLACK & WHITE WITH BORDER */
.header {
  background: #000;
  color: #fff;
  padding: 15px 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-family: 'Times New Roman', serif;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 2px;
  border-bottom: 4px solid #fff;
  border-image: repeating-linear-gradient(45deg, #000, #000 10px, #fff 10px, #fff 20px) 4;
  position: relative;
}
.header::before, .header::after {
  content: ""; /* Khali kar diya */
  position: absolute;
  top: 8px;
  font-size: 14px;
  letter-spacing: 10px;
  color: #000;
  background: #fff;
  padding: 3px 6px;
  border-radius: 3px;
}
.header::before {left: 10px;}
.header::after {right: 10px;}

.logo-center {
  height: 45px;
  width: auto;
  vertical-align: middle;
}

    /* BREAKING TICKER SLIDE */
    .breaking{background:#ff0000;color:#fff;padding:8px;font-size:14px;overflow:hidden;white-space:nowrap;}
    .breaking span{background:#ffff00;color:#000;padding:3px 8px;font-weight:bold;margin-right:10px;border-radius:3px;}
    .ticker{display:inline-block;padding-left:100%;animation:scroll 15s linear infinite;}
    @keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}

    .container{max-width:1000px;margin:15px auto;padding:10px;}
    .card{background:#fff;margin-bottom:15px;border-radius:5px;overflow:hidden;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
    .card img{width:100%;height:180px;object-fit:cover;}
    .card h2{font-size:18px;padding:10px;margin:0;color:#000;}
    .card a{text-decoration:none;color:inherit;}
    
}
}
    
    /* FOOTER */
    .footer{background:#222;color:#ccc;text-align:center;padding:20px 10px;margin-top:30px;font-size:14px;}
    .footer h3{color:#fff;margin:5px 0;}
    .btn{display:inline-block;margin:5px;padding:10px 15px;border-radius:5px;text-decoration:none;color:#fff;font-weight:bold;}
    .btn-whatsapp{background:#25D366;}
    .btn-insta{background:#E1306C;}
</style>
</head>
<body>

<div class="header">
  <span>THE</span>
  <img src="logo.png" class="logo-center">
  <span>PASHUPATINATH NEWS</span>
</div>
<div class="breaking">
  <span>BREAKING</span>
  <div class="ticker">
    कुकुरी में बाढ़ का खतरा | मौसम विभाग ने जारी किया अलर्ट | अगली खबर 2 मिनट में
  </div>
</div>

<div class="container">
  <div class="card">
    <a href="#">
      <img src="https://images.unsplash.com/photo-1508697014387-db70aad34f4d?q=80&w=1000">
      <h2>कुकुरी में भारी बारिश से जनजीवन प्रभावित, प्रशासन अलर्ट पर</h2>
    </a>
  </div>
</div>

<div class="footer">
  <h3>Owner: Aayush Vaishnav</h3>
  <p>Contact: 9303100358</p>
  <a href="https://wa.me/919303100358" class="btn btn-whatsapp">WhatsApp</a>
  <a href="https://instagram.com" class="btn btn-insta">Instagram</a>
  <p style="margin-top:15px;">© 2026 The Pashupatinath News</p>
</div>

</body>
</html>
