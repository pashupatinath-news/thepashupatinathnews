<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pashupatinath News - Kunkuri Edition</title>
<meta name="description" content="Kunkuri ki sabse tez khabar. Local, National, Khel, Dharm ki news">
<style>
body { font-family: 'Noto Serif', serif; background:#f5f5f5; margin:0; color:#111; }
.header { background:#b30000; color:white; text-align:center; padding:15px; }
.header h1 { margin:0; font-size:28px; }
.header p { margin:5px 0 0; font-size:14px; }
.topbar { background:white; border-bottom:2px solid #b30000; padding:8px; text-align:center; font-weight:bold; }
.container { max-width:1100px; margin:20px auto; padding:10px; display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; }
.news { background:white; padding:12px; border:1px solid #ddd; }
.news h3 { font-size:18px; margin:5px 0; color:#b30000; }
.news p { font-size:14px; line-height:1.6; }
.news .meta { font-size:12px; color:#666; margin-top:8px; }
.pages { text-align:center; margin:20px; }
.pages a { background:#b30000; color:white; padding:8px 15px; margin:3px; text-decoration:none; border-radius:3px; }
@media(max-width:768px){ .container{ grid-template-columns:1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1>THE PASHUPATINATH NEWS</h1>
  <p>Kunkuri Edition | Satyamev Jayate</p>
</div>

<div class="topbar" id="dateBox"></div>

<div class="container" id="newsGrid"></div>

<div class="pages">
  <a href="#">Page 1</a>
  <a href="#">Page 2</a>
  <a href="#">Page 3</a>
</div>

<script>
const today = new Date().toLocaleDateString('hi-IN', {day:'2-digit', month:'long', year:'numeric'});
document.getElementById('dateBox').innerText = `Edition: Kunkuri | Date: ${today} | Page: 1`;

const news = [
  {category:"National", title:"Jai Shree Ganesha", content:"Aaj Ganesh ji ki pooja hai. Mandiro me bhakto ki bheed.", date:today},
  {category:"Local", title:"Kunkuri me baarish", content:"Pichle 24 ghante me achhi baarish hui. Kisano me khushi.", date:today},
  {category:"Dharam", title:"Mandir me bhandara", content:"Pashupatinath mandir me kal bhandara aayojit.", date:today}
];

let html = '';
news.forEach(n => {
  html += `<div class="news">
    <div class="meta">${n.category}</div>
    <h3>${n.title}</h3>
    <p>${n.content}</p>
    <div class="meta">${n.date}</div>
  </div>`;
});
document.getElementById('newsGrid').innerHTML = html;
</script>

</body>
</html>
