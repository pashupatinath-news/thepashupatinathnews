<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pashupatinath News</title>
<style>
  body { margin:0; font-family: Arial, sans-serif; background:#fff; text-align:center; }
  
  .header { 
    background:#FFD700; 
    padding:15px 10px; 
    text-align:center; 
    border-bottom:3px solid #000; 
  }
  .header img { 
    height:55px; 
    vertical-align:middle; 
    margin:0 12px; 
  }
  .header h1 { 
    display:inline; 
    font-size:30px; 
    color:#000080; 
    vertical-align:middle; 
    font-weight:bold;
    letter-spacing:1px;
  }
  .tagline { 
    text-align:center; 
    font-style:italic; 
    font-size:13px; 
    margin:8px 0 20px 0; 
    color:#333;
  }

  .main-image {
    margin:20px auto;
    padding:10px;
  }
  .main-image img {
    width:90%;
    max-width:400px;
    border:2px solid #FFD700;
    border-radius:8px;
    cursor:pointer;
  }
  .main-image p {
    margin-top:8px;
    font-size:14px;
    color:#555;
  }

  h3 {
    margin:25px 15px;
    font-size:20px;
    color:#000080;
    border-bottom:2px solid #FFD700;
    display:inline-block;
    padding-bottom:5px;
  }

</style>
</head>
<body>

<div class="header">
  <img src="logo-emblem.png" alt="Emblem">
  <h1>THE PASHUPATINATH NEWS</h1>
  <img src="logo-emblem.png" alt="Emblem">
</div>

<div class="tagline">'It's not just any news' - Nepal's most trusted news of faith and culture.</div>

<div class="main-image">
  <a href="logo-emblem.png" target="_blank">
    <img src="logo-emblem.png" alt="Shiva Emblem">
  </a>
  <p>Click on Image to View</p>
</div>

<h3>Choose Your Plan</h3>

</body>
</html>
