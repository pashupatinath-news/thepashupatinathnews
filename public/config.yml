backend:
  name: github
  repo: pashupatinath-news/thepashupatinathnews
  branch: main
  base_url: https://pashupatinath-news.github.io
  auth_endpoint: api/auth

media_folder: public/news/images
public_folder: /news/images

collections:
    - name: "news"
    label: "News"
    folder: "public/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
            - {label: "Title", name: "title", widget: "string"}
            - {label: "Publish Date", name: "date", widget: "datetime"}
            - {label: "Body", name: "body", widget: "markdown"}
