backend:
  name: git-gateway
  branch: main
media_folder: public/images
public_folder: /images
collections:
    - name: news
    label: News
    folder: content/news
    create: true
    fields:
            - {label: Title, name: title, widget: string}
            - {label: Date, name: date, widget: datetime}
            - {label: Image, name: image, widget: image}
            - {label: Body, name: body, widget: markdown}
