backend:
  name: github
  repo: pashupatinath-news/thepashupatinathnews
  branch: main
  base_url: https://pashupatinath-news.github.io
  auth_endpoint: api/auth

media_folder: "images"
public_folder: "/images"

collections:
    - name: "news"
    label: "News"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
            - {label: "Title", name: "title", widget: "string"}
            - {label: "Date", name: "date", widget: "datetime"}
            - {label: "Body", name: "body", widget: "markdown"}
